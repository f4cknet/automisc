# extend-tools/manifest.yaml
#
# AutoMisc 跨平台 binary 清单（per v0.5-platform-extend-tools 治理变更）
#
# 维护方式：
# - 版本变化时改这里
# - SHA256 由 install.ps1 首次下载后回填（也可以手工填）
# - bin/win-x64/*.exe 不入 git，通过本文件追溯
#
# 字段：
# - version: 工具版本（跟官方 release 对齐）
# - url: 下载地址（直链）
# - sha256: 64 字符 hex（首次下载后回填）
# - post_extract: 解压后处理（zip 才有, rename / 解嵌套）
# - available: false = 该平台暂无方案

version: "1.1"
# 最后更新: 2026-06-28 (per v0.5-zbar-windows-install manifest 同步)
# - 新增: steghide (Cygwin 构建), vim92 (Vim Win32 installer 整包)
# - 备注: 7z.exe 是 7zr.exe 的 hardlink, manifest 仍只列 7zr
# - 注: evtx_dump CLI 暂不加入 manifest (per v0.5-windows-evtx-dump §6 决策:
#   adapter 用 python-evtx 0.8.1, CLI 0 调用; 实战 ≥3 道同类再升架构 per AGENTS §5.2)
# - v0.5-zbar-windows-install (2026-06-28 23:00 Owner 拍板):
#   新增 msvcr120.dll (VS 2013 redist, 953KB) + pyzbar pip 包.
#   zbar 走 pyzbar Python lib (Win wheel 自带 zbar DLL) 而非 zbarimg.exe (SourceForge 失效).

platforms:
  win-x64:
    description: "Windows 10/11 x64"
    binaries:
      # 7 binaries (downloaded by install.ps1 + manual extract)
      exiftool:
        version: "13.29"
        # exiftool.org 主站 2026-06-27 临时挂了, SourceForge /download 返 HTML (mirror 选择页)
        # 改用 ShareX 维护的 Windows prebuilt (GitHub release 直接发 zip asset)
        url: "https://github.com/ShareX/ExifTool/releases/download/v13.29/exiftool-13.29-win64.zip"
        sha256: "AE8E1FC95266AA5F2769E16CD940F88BF80FA408484AB10A8808895992E1CFB6"  # ShareX 官方 release notes 提供
        available: true
        notes: "exiftool(-k).exe zip, install 后 rename; ShareX 维护 (2025-05-07 release)"
        post_extract:
          zip_contains: "exiftool(-k).exe"
          rename_to: "exiftool.exe"

      7zr:
        version: "24.07"
        url: "https://www.7-zip.org/a/7zr.exe"
        sha256: "56B8CC9F4971CEF253644FAFE54063ED7FDCA551D4DEE0F8C6BAA81B855ACD72"  # 2026-06-27 install.ps1 算出
        available: true
        notes: |
          7-Zip 独立版 (不需安装器), 单文件.
          adapter 用 '7z' 名 (兼容 macOS brew 装的 p7zip).
          extend-tools 里实际文件名是 '7zr.exe', install.ps1 / Owner 手工建 7z.exe hardlink,
          adapter 调 '7z' 命令, adapter 解析时优先 extend-tools/bin/win-x64/7z.exe.

      foremost:
        version: "1.5.7"
        url: "https://github.com/raddyfiy/foremost/raw/master/binary/foremost.exe"
        sha256: "83BE6BFA4E83B2015BDC61DFD7059AE16EBBB0471D0F7F7D48B70BF97362C3A6"  # 2026-06-27 install.ps1 算出
        available: true
        notes: "第三方 fork (CTF 圈通用), 官方无 Windows 版"

      file:
        version: "5.29"
        url: "https://github.com/nscaife/file-windows/releases/download/20170108/file-windows-20170108.zip"
        sha256: "21ACF14A7C7A5971DA369B1022764526F3D71895387829C640C3E2960E56E057"  # 2026-06-28 PR2 install 算出
        available: true
        notes: |
          file CLI v5.29 (libmagic), nscaife/file-windows prebuilt (2017-01-08 最后 release,
          CTF 社区常用, 下载 11 万次). 原生 Unix `file` CLI Win 不可用.
          zip 包含: file.exe + libgnurx-0.dll + libmagic-1.dll + magic.mgc (4.8MB) + 2 个 COPYING.
          install.ps1 全部部署到 extend-tools/bin/win-x64/ (libmagic 依赖要求同目录).

      steghide:
        version: "0.5.1-cygwin"
        # Cygwin 维护的 steghide prebuilt (32-bit cygwin1.dll runtime)
        # 官方 steghide 0.5.1 (2007) 后停止维护, Cygwin port 由开源社区持续打包.
        url: "https://github.com/jeffkowalski/steghide/releases/download/v0.5.1/steghide-0.5.1-cygwin.zip"
        sha256: ""  # TODO: 2026-06-28 Owner 手工解压, 缺 sha256; install.ps1 自动回填时补上
        available: true
        notes: |
          steghide (JPEG/BMP/WAV/AU 隐写 + 口令) Cygwin build v0.5.1.
          官方 steghide 0.5.1 (Stefan Hügel, 2007 最后 release) 后无 Win 版,
          Cygwin/MSYS2 社区持续打包. 当前用 jeffkowalski/steghide GitHub release.
          部署到 extend-tools/bin/win-x64/steghide/ 子目录:
            - steghide.exe
            - cygwin1.dll (Cygwin runtime, 必带)
            - cygiconv-2.dll / cygintl-2.dll / cygjpeg-62.dll / cygmcrypt-4.dll / cygmhash-2.dll / cygz.dll
            - locale/{de,es,fr,ro}/LC_MESSAGES/steghide.mo
          调 'steghide' 命令, adapter 解析时优先 extend-tools/bin/win-x64/steghide/steghide.exe.
          已知限制: Win 进程需要 msys-2.0.dll 不需要 (cygwin1.dll 已含), 不依赖额外 PATH.

      msvcr120:
        version: "12.00.30501.0"  # VS 2013 Update 5 redist
        # MSVCR120.dll (VS 2013 C runtime) — pyzbar 自带的 libzbar-64.dll 链这个.
        # Win ship 默认没装 VS 2013 redist, 报 "Could not find module 'libiconv.dll' (or one of its dependencies)".
        # 解决: install.ps1 把这个 DLL 复制到 pyzbar site-packages.
        # 来源: Microsoft Office 2016 自带 (per Owner 2026-06-28 实测 C:\Program Files\Microsoft Office\root\Client\msvcr120.dll)
        # 微软允许随 redist 自由分发, 第三方打包合法.
        # 替代方案: 装 vcredist_x64.exe (7MB, https://aka.ms/highdpimfc2013x64enu), 但 7MB 比 953KB DLL 重, 不必要.
        url: ""  # TODO: 2026-06-28 Owner 自带, 走 manifest + install.ps1 复用, 不下载
        sha256: "B8FDFC70374672B4DFB41EB48509405017F316C029F4EF6F5C490ECAFB16DBF6"  # 2026-06-28 install.ps1 算出
        available: true
        notes: |
          msvcr120.dll 953KB, 微软 VS 2013 C runtime (Update 5 版本 12.00.30501.0).
          来源: 任何装过 Office 2016+ 的 Windows 系统 C:\Program Files\Microsoft Office\root\Client\msvcr120.dll.
          install.ps1 部署流程:
            1) source = extend-tools/bin/win-x64/msvcr120.dll (跟 exiftool_files/ 同级)
            2) 找 site-packages/pyzbar/ 路径 (pyzbar pip install 后才有)
            3) Copy-Item 到 site-packages/pyzbar/msvcr120.dll
            4) 装完后 pyzbar import 即可加载 libzbar-64.dll, 报 "Could not find module" 错误消失.
          不需要 PATH 注册, 跟 libzbar-64.dll 同目录即可被 LoadLibrary 找到.

      qemu-img:
        version: "9.1.0"  # TODO: install.ps1 首次下载后回填 (Owner 装时定)
        # QEMU Win NSIS installer (Stefan Weil 维护 qemu.weilnetz.de).
        # 装到 C:\Program Files\qemu\qemu-img.exe (默认 NSIS 路径), 500MB+ 全 setup
        # 装完 (含 qemu-system GUI tools, 实战不用), qemu-img.exe 在 PATH.
        # 实战 v0.5-train-018: vmdk 走 qemu-img convert, 7z 26.02 不支持 vmdk.
        # **不**复制到 extend-tools/ (避免 500MB+ 复制); paths.py 走 shutil.which("qemu-img") 优先,
        # 命中 C:\Program Files\qemu\qemu-img.exe. 如果 setup 没自动加 PATH, Owner 手工:
        #   [Environment]::SetEnvironmentVariable("Path", $env:Path + ";C:\Program Files\qemu", "User")
        url: "https://qemu.weilnetz.de/w64/qemu-w64-setup-2025.05.12.exe"  # TODO: URL confirm
        sha256: ""  # TODO: install.ps1 首次下载后回填
        available: true
        notes: |
          qemu-img Win NSIS installer.
          install.ps1 Stage 1 调 setup.exe /S 静默装 (NSIS standard /S flag).
          装完路径: C:\Program Files\qemu\qemu-img.exe.
          NSIS installer 自动把 C:\Program Files\qemu\ 加到系统 PATH (per QEMU 官方 install guide).
          实战: vmdk -> qemu-img convert -f vmdk -O raw flag.vmdk flag.raw.
          关联: v0.5-train-018 (vmdk 实战触发), v0.5-sevenz-extract doc-fix 2026-06-29 (7z 不支持 vmdk).
          0 extend-tools/ 占用 (不复制, 走系统 PATH).

      vim92:
        version: "9.2.0"
        # Vim 官方 Windows installer (vim-win32-installer on GitHub).
        # 9.2 = "92" 系列, 自解压 gvim92.exe 含 vim.exe + gvim.exe + diff + xxd + DLL + runtime.
        url: "https://github.com/vim/vim-win32-installer/releases/download/v9.2.0/gvim_9.2.0000_x64_signed.exe"
        sha256: ""  # TODO: Owner 手工解压, 缺 sha256
        available: true
        notes: |
          Vim 9.2 (2026-02-14 release) Win64 自解压 installer (vim.org 官方分发渠道 = GitHub vim/vim-win32-installer).
          extend-tools/bin/win-x64/vim92/ 包含完整 Vim 安装目录:
            - vim.exe + gvim.exe (GUI)
            - diff.exe (GNU diffutils 2.7, Vim installer bundled)
            - xxd.exe (Vim xxd, hex dump)
            - tee.exe / vimrun.exe / install.exe / uninstall.exe / winpty-agent.exe
            - vim64.dll (5.5MB, Vim 主 DLL) + libiconv-2.dll + libintl-8.dll + libsodium.dll + winpty64.dll
            - runtime files: defaults.vim / filetype.vim / syntax/* / doc/* / ftplugin/* (~200+ 文件)
          adapter 用法:
            - `diff`: extend-tools/bin/win-x64/vim92/diff.exe (file/diff tool, 不走 Unix `diff`)
            - `xxd`: extend-tools/bin/win-x64/vim92/xxd.exe (通用 hex dump)
            - `vim`: extend-tools/bin/win-x64/vim92/vim.exe (GUI 调用或脚本编辑)
          paths.py:resolve_tool_binary 异名 subdir fallback
          (per v0.5-extend-tools-subdir-flexible, 2026-06-29 Owner) 自动
          扫 bindir/*/xxd.exe 找到 vim92/xxd.exe, 不需要 explicit entry.

    pip_packages:
      # 1 Python package (pip install by install.ps1)
      binwalk:
        pip_name: "binwalk"
        version_spec: ""  # latest (v2.3.x Python 版, CTF 够用)
        available: true
        notes: |
          binwalk v3 是 Rust 重写, ReFirmLabs 从未在 GitHub release 发 Windows prebuilt
          (per 2026-06-27 API 查询, 所有 release assets 都空).
          改用 pip install binwalk (v2.3.x Python 版, CTF 实战足够).
          pyproject.toml 已声明此依赖, venv 激活后 binwalk.exe 在 PATH,
          adapter 调 'binwalk' 命令即可, 不需要 extend-tools 路径.

      pyzbar:
        pip_name: "pyzbar"
        version_spec: "==0.1.9"  # 2026-06-28 实测 Win wheel 含 libzbar-64.dll + libiconv.dll
        available: true
        notes: |
          pyzbar 0.1.9 — Py3 ctypes wrapper for zbar barcode reader.
          Win wheel (817KB) 自带 libzbar-64.dll (164KB) + libiconv.dll (958KB).
          替代 zbarimg subprocess (SourceForge `zbar-0.10-setup.exe` 4 mirror 全 200 HTML, 链接失效).
          adapter `src/automisc/tools/misc/brainteaser/zbar.py` 切到 `pyzbar.pyzbar.decode(PIL.Image)`,
          output 格式 1:1 兼容 `zbarimg --raw` (一行一条解码文本), GUI 入口 + 单测**0 改动**.
          依赖: msvcr120.dll (本 manifest 同步部署到 site-packages/pyzbar/).
          macOS / Linux 同样 work, 跨平台统一 (v0.5-zbar-windows-install 决策).

    # Windows 上仍不可用的工具（v0.5+ 评估替代方案）
    unavailable:
      zsteg:
        reason: "Ruby gem, Windows 上需装 RubyInstaller (~300MB)"
        alternatives: "自研 lsb_detect (per v0.5-lsb-detector) 已在 auto-run 替代"
      stegseek:
        reason: "无官方 Windows 版 (steghide 替代品, 高速字典爆破)"
        alternatives: "Owner 评估 MSYS2 build 或 Python 重写; 暂无 ETA"

  macos:
    description: "macOS (Apple Silicon + Intel)"
    binaries: {}  # Homebrew 优先, 不强制 extend-tools
    pip_packages: {}

  linux-x64:
    description: "Linux x64"
    binaries: {}  # 不在范围 (AGENTS.md §2.3 v0.5+ 评估 CI)
    pip_packages: {}